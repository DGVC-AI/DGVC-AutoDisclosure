name: KIND공시 - RAW데이터 및 시트 내용 채우기 (Put&Call 제외)

on:
  schedule:
    # 매일 UTC 6시, 8시, 10시, 11시 (한국 시간 15시, 17시, 19시, 20시)
    - cron: "0 6,8,10,11 * * *"
  workflow_dispatch:

concurrency:
  group: kind-pipeline
  cancel-in-progress: false

jobs:
  run-kind-parse:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # 이 아래 부분만 추가되었습니다.
    defaults:
      run:
        working-directory: ./DisclosureInformation-Kind-main

    env:
      TZ: Asia/Seoul
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      HEADLESS: "true"
      LIMIT: "30"
      DUMP_SHEET_NAME: "RAW_dump"
      SEEN_SHEET_NAME: "seen"
      RIGHTS_SHEET_NAME: "K_유상증자"
      BOND_SHEET_NAME: "K_주식연계채권"
      REVIEW_LOOKBACK_MINUTES: "20"
      KEYWORDS: "유상증자결정,전환사채권발행결정,교환사채권발행결정,신주인수권부사채권발행결정"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: Run RAW scraper
        run: python main_raw.py

      - name: Run parser
        run: python main_parse.py        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: Run RAW scraper
        run: python main_raw.py

      - name: Run parser
        run: python main_parse.py
