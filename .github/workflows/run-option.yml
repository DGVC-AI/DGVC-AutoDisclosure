name: KIND공시 - Put&Call 전용 액션

on:
  workflow_run:
    workflows: ["KIND공시 - RAW데이터 및 시트 내용 채우기 (Put&Call 제외)"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: kind-pipeline
  cancel-in-progress: false

jobs:
  run-kind-option:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # 이 아래 부분만 추가되었습니다.
    defaults:
      run:
        working-directory: ./DisclosureInformation-Kind-main

    env:
      TZ: Asia/Seoul
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      DUMP_SHEET_NAME: "RAW_dump"
      BOND_SHEET_NAME: "K_주식연계채권"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run option parser
        run: python main_option.py
