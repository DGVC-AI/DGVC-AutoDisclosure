name: DART 주식연계채권

on:
  schedule:
    # 매일 UTC 6시, 8시, 10시, 11시 (한국 시간 15시, 17시, 19시, 20시)
    - cron: "0 6,8,10,11 * * *"
  workflow_dispatch:

jobs:
  update-sheet:
    runs-on: ubuntu-latest

    # 이 아래 부분만 추가되었습니다.
    defaults:
      run:
        working-directory: ./DisclosureInformation-Dart-main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 원본 유지

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run DART Bot script (Equity-Linked)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python equity_linked.py
